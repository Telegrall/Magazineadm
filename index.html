<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Магазин — Панель управления</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, sans-serif; }
        body { background:#f5f5f5; min-height:100vh; padding:16px; }
        body.dark { background:#0e1621; color:#eef4ff; }
        body.dark .card { background:#1f2c38; border-color:#2b3b4c; }
        body.dark .field input, body.dark .field select { background:#0e1621; border-color:#2b3b4c; color:#fff; }
        body.dark .result { background:#17212b; }
        body.dark .search-result { background:#17212b; }
        .container { max-width:500px; margin:0 auto; }
        h1, h2 { color:#2b9aff; margin-bottom:16px; }
        .card { background:#fff; border-radius:20px; padding:20px; margin-bottom:16px; box-shadow:0 2px 12px rgba(0,0,0,0.08); border:1px solid #eee; }
        .field { margin-bottom:12px; }
        .field label { display:block; font-size:0.8rem; color:#666; margin-bottom:4px; }
        body.dark .field label { color:#8e9eae; }
        .field input, .field select { width:100%; padding:10px 14px; border:1px solid #ddd; border-radius:12px; font-size:0.9rem; }
        .btn { width:100%; background:#2b9aff; border:none; border-radius:14px; padding:12px; color:#fff; font-weight:600; cursor:pointer; margin-bottom:8px; }
        .btn-outline { background:transparent; border:1px solid #2b9aff; color:#2b9aff; }
        .btn-green { background:#4bcb6e; }
        .btn-danger { background:#ff3b30; }
        .btn-call { background:#ff8c00; }
        .btn-theme { position:fixed; top:16px; right:16px; background:#1f2c38; border:none; color:#fff; padding:8px 12px; border-radius:20px; cursor:pointer; font-size:0.8rem; z-index:100; }
        body.dark .btn-theme { background:#fff; color:#000; }
        .result { padding:12px; background:#f0f8ff; border-radius:12px; margin:12px 0; font-size:0.9rem; line-height:1.5; }
        .status-badge { display:inline-block; padding:4px 10px; border-radius:12px; font-size:0.75rem; font-weight:600; }
        .status-new { background:#d4e4ff; color:#1a4a8a; }
        .status-delivering { background:#fff3d4; color:#8a6a1a; }
        .status-done { background:#d4f5d4; color:#1a7a1a; }
        .status-cancelled { background:#ffe0e0; color:#c0392b; }
        .tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
        .tab { flex:1; min-width:50px; text-align:center; padding:10px; background:#e8e8e8; border-radius:14px; cursor:pointer; font-weight:500; font-size:0.7rem; }
        .tab.active { background:#2b9aff; color:#fff; }
        body.dark .tab { background:#2b3b4c; }
        body.dark .tab.active { background:#2b9aff; }
        .hidden { display:none !important; }
        .search-result { padding:10px 12px; background:#f9f9f9; border-radius:10px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
        body.dark .search-result { background:#17212b; }
        .login-screen { display:flex; align-items:center; justify-content:center; min-height:80vh; }
        .login-card { background:#fff; border-radius:24px; padding:30px; width:100%; max-width:350px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
        body.dark .login-card { background:#1f2c38; }
        .login-card input { width:100%; padding:12px; margin-bottom:12px; border:1px solid #ddd; border-radius:12px; }
        body.dark .login-card input { background:#0e1621; border-color:#2b3b4c; color:#fff; }
        .perm-label { display:inline-flex; align-items:center; gap:4px; font-size:0.7rem; margin-right:8px; }
        .delivery-rules { background:#f0f8ff; border-radius:12px; padding:10px; margin-bottom:12px; font-size:0.8rem; }
        body.dark .delivery-rules { background:#1a2a3a; }
    </style>
</head>
<body>
<button class="btn-theme hidden" id="themeBtn" onclick="toggleTheme()">Тема</button>

<div class="container" id="mainContainer">
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h1>Панель управления</h1>
            <p style="color:#888; margin-bottom:20px;">Введите данные для входа</p>
            <input type="text" id="loginCode" placeholder="5-значный код">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button class="btn" onclick="adminLogin()">Войти</button>
        </div>
    </div>

    <div id="adminInterface" class="hidden">
        <h1>Панель управления</h1>
        <div id="staffInfo" style="font-size:0.8rem; color:#8e9eae; margin-bottom:12px;"></div>

        <div class="tabs">
            <div class="tab active" onclick="switchPanel('clients')">Клиенты</div>
            <div class="tab" onclick="switchPanel('products')">Товары</div>
            <div class="tab" onclick="switchPanel('orders')">Заказы</div>
            <div class="tab" onclick="switchPanel('delivery')">Доставка</div>
            <div class="tab" onclick="switchPanel('staff')">Сотрудники</div>
            <div class="tab" onclick="switchPanel('messages')">Сообщения</div>
        </div>

        <div id="panelClients" class="card">
            <h2>Поиск клиента (последние 4 цифры)</h2>
            <div class="field"><label>4 цифры номера</label><input type="text" id="clientPhone" placeholder="4567" maxlength="4"></div>
            <button class="btn" onclick="searchClient()">Найти</button>
            <div id="clientResult"></div>
        </div>

        <div id="panelProducts" class="card hidden">
            <h2>Товары</h2>
            <div class="field"><label>Поиск</label><input type="text" id="productSearch" placeholder="Номер или название"></div>
            <button class="btn" onclick="searchProduct()">Найти</button>
            <div id="productResult"></div>
            <button class="btn-outline" onclick="addProduct()" style="margin-top:12px;">Добавить товар</button>
        </div>

        <div id="panelOrders" class="card hidden">
            <h2>Заказы</h2>
            <div id="ordersList"></div>
        </div>

        <div id="panelDelivery" class="card hidden">
            <h2>Доставка</h2>
            <div class="delivery-rules">
                Правила доставки:<br>
                Заказ до 250 руб — доставка 50 руб<br>
                Заказ от 250 руб — доставка бесплатно
            </div>
            <div id="deliveryList"></div>
        </div>

        <div id="panelStaff" class="card hidden">
            <h2>Сотрудники</h2>
            <div id="staffList"></div>
            <button class="btn-outline" onclick="addStaff()" style="margin-top:12px;">Добавить</button>
        </div>

        <div id="panelMessages" class="card hidden">
            <h2>Сообщения</h2>
            <div id="messagesList"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://iiuahjmpszfcgtwapidt.supabase.co";
    const SUPABASE_KEY = "sb_publishable_iFYpqkv4D0qEOj4Dn1X9Nw_OH9d5Bji";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentTheme = localStorage.getItem('store_admin_theme') || 'light';
    let currentStaff = null;
    let allProducts = [];

    function applyTheme() { document.body.classList.toggle('dark', currentTheme === 'dark'); }
    function toggleTheme() { currentTheme = currentTheme === 'light' ? 'dark' : 'light'; localStorage.setItem('store_admin_theme', currentTheme); applyTheme(); }
    applyTheme();

    async function adminLogin() {
        const login = document.getElementById('loginCode').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        // Сначала пробуем Supabase
        let { data } = await sb.from('store_staff').select('*').eq('login', login).eq('password', password).single();
        
        // Если Supabase не работает, пробуем localStorage
        if (!data) {
            const staff = JSON.parse(localStorage.getItem('store_staff') || '[]');
            data = staff.find(s => s.login === login && s.password === password);
        }
        
        if (data) {
            currentStaff = data;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminInterface').classList.remove('hidden');
            document.getElementById('themeBtn').classList.remove('hidden');
            document.getElementById('staffInfo').innerText = 'Вы: ' + data.name + ' (' + (data.role || 'admin') + ')';
            loadAllProducts();
            renderStaff();
            renderMessages();
        } else {
            alert('Неверный код или пароль');
        }
    }

    function switchPanel(panel) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        const targetTab = document.querySelector(`.tab[onclick*="${panel}"]`);
        if (targetTab) targetTab.classList.add('active');
        ['Clients','Products','Orders','Delivery','Staff','Messages'].forEach(p => {
            document.getElementById('panel'+p).classList.add('hidden');
        });
        document.getElementById('panel'+panel.charAt(0).toUpperCase()+panel.slice(1)).classList.remove('hidden');
        if (panel==='products') loadAllProducts();
        if (panel==='orders') renderOrders();
        if (panel==='delivery') renderDelivery();
        if (panel==='staff') renderStaff();
        if (panel==='messages') renderMessages();
    }

    // КЛИЕНТЫ
    async function searchClient() {
        const digits = document.getElementById('clientPhone').value.trim();
        if (digits.length !== 4) return alert('Введите ровно 4 цифры');
        const container = document.getElementById('clientResult');
        container.innerHTML = '<p>Поиск...</p>';
        
        try {
            const { data } = await sb.from('store_clients').select('*');
            const found = data?.filter(c => c.phone && c.phone.replace(/\D/g,'').endsWith(digits));
            if (!found || found.length===0) { container.innerHTML = '<p>Клиент не найден</p>'; return; }
            container.innerHTML = found.map(c => `
                <div class="result"><b>${c.name}</b><br>Телефон: ${c.phone}<br>Баллы: ${c.balance || 0}</div>
            `).join('');
        } catch(e) {
            container.innerHTML = '<p>Ошибка загрузки. Проверьте интернет.</p>';
        }
    }

    // ТОВАРЫ
    async function loadAllProducts() {
        try {
            const { data } = await sb.from('store_products').select('*').order('code');
            allProducts = data || [];
        } catch(e) {
            allProducts = JSON.parse(localStorage.getItem('store_products') || '[]');
        }
        renderAllProducts();
    }
    
    function renderAllProducts(filter='') {
        const container = document.getElementById('productResult');
        const filtered = filter ? allProducts.filter(p => 
            p.code.toString() === filter || p.name.toLowerCase().includes(filter.toLowerCase())
        ) : allProducts;
        
        if (filtered.length === 0) { container.innerHTML = '<p>Ничего не найдено</p>'; return; }
        container.innerHTML = filtered.map(p => `
            <div class="search-result">
                <div><b>#${p.code} ${p.name}</b><br><small>${p.price} руб | Ост: ${p.stock}</small></div>
                <div style="display:flex;gap:4px;">
                    <button class="btn btn-small" onclick="window.editProduct(${p.id})" style="background:#ffc107;color:#000;padding:4px 8px;">Ред</button>
                    <button class="btn btn-small btn-danger" onclick="window.deleteProduct(${p.id})" style="padding:4px 8px;">Уд</button>
                </div>
            </div>
        `).join('');
    }
    
    function searchProduct() { renderAllProducts(document.getElementById('productSearch').value.trim()); }
    
    async function addProduct() {
        const name = prompt('Название:'); if (!name) return;
        const code = parseInt(prompt('Код:')); if (isNaN(code)) return;
        const price = parseInt(prompt('Цена:')); if (isNaN(price)) return;
        const stock = parseInt(prompt('Остаток:')) || 0;
        
        try {
            await sb.from('store_products').insert({ code, name, price, stock });
        } catch(e) {
            allProducts.push({ id: Date.now(), code, name, price, stock });
            localStorage.setItem('store_products', JSON.stringify(allProducts));
        }
        alert('Товар добавлен');
        loadAllProducts();
    }

    window.editProduct = async function(id) {
        const p = allProducts.find(pr => pr.id === id); if (!p) return;
        const name = prompt('Название:', p.name); if (name === null) return;
        const price = parseInt(prompt('Цена:', p.price)); if (isNaN(price)) return;
        const stock = parseInt(prompt('Остаток:', p.stock)) || 0;
        
        try {
            await sb.from('store_products').update({ name, price, stock }).eq('id', id);
        } catch(e) {
            const idx = allProducts.findIndex(pr => pr.id === id);
            if (idx >= 0) { allProducts[idx].name = name; allProducts[idx].price = price; allProducts[idx].stock = stock; }
            localStorage.setItem('store_products', JSON.stringify(allProducts));
        }
        alert('Обновлено');
        loadAllProducts();
    };

    window.deleteProduct = async function(id) {
        if (!confirm('Удалить товар?')) return;
        try {
            await sb.from('store_products').delete().eq('id', id);
        } catch(e) {
            allProducts = allProducts.filter(pr => pr.id !== id);
            localStorage.setItem('store_products', JSON.stringify(allProducts));
        }
        alert('Удалён');
        loadAllProducts();
    };

    // ЗАКАЗЫ
    async function renderOrders() {
        const container = document.getElementById('ordersList');
        container.innerHTML = '<p>Загрузка...</p>';
        
        try {
            const { data } = await sb.from('store_orders').select('*').order('created_at', { ascending: false });
            if (!data || data.length === 0) { container.innerHTML = '<p>Нет заказов</p>'; return; }
            container.innerHTML = data.map(o => {
                const total = o.total || 0;
                const deliveryFee = total < 250 ? 50 : 0;
                return `<div class="search-result"><div><b>${o.client_name}</b><br>${o.client_address || ''}<br>${total} руб + ${deliveryFee} руб доставка<br><span class="status-badge status-${o.status}">${o.status}</span></div>
                <div style="display:flex;gap:4px;flex-wrap:wrap;">
                    ${o.status==='new' ? `<button class="btn btn-small btn-green" onclick="window.acceptOrder(${o.id})">Принять</button><button class="btn btn-small btn-danger" onclick="window.rejectOrder(${o.id})">Отклонить</button>` : ''}
                    <button class="btn btn-small" onclick="window.sendReceipt(${o.id})">Чек</button>
                </div></div>`;
            }).join('');
        } catch(e) {
            container.innerHTML = '<p>Ошибка загрузки заказов</p>';
        }
    }

    window.acceptOrder = async function(id) {
        try {
            await sb.from('store_orders').update({ status:'delivering' }).eq('id', id);
        } catch(e) {}
        renderOrders();
    };

    window.rejectOrder = async function(id) {
        const reason = prompt('Причина отклонения:') || 'Отклонено';
        try {
            await sb.from('store_orders').update({ status:'cancelled', reject_reason:reason }).eq('id', id);
        } catch(e) {}
        renderOrders();
    };

    window.sendReceipt = async function(id) {
        const { data } = await sb.from('store_orders').select('*').eq('id', id).single();
        if (!data) return alert('Заказ не найден');
        const total = data.total || 0;
        const deliveryFee = total < 250 ? 50 : 0;
        window.location.href = 'mailto:'+(data.client_email||'')+'?subject=Чек&body='+encodeURIComponent(
            'Чек по заказу от '+new Date(data.created_at).toLocaleString('ru')+'\nСумма: '+total+' руб\nДоставка: '+deliveryFee+' руб\nИтого: '+(total+deliveryFee)+' руб\n\nСпасибо!'
        );
    };

    // ДОСТАВКА
    async function renderDelivery() {
        const container = document.getElementById('deliveryList');
        container.innerHTML = '<p>Загрузка...</p>';
        
        try {
            const { data } = await sb.from('store_orders').select('*').in('status',['new','delivering']).order('created_at',{ascending:false});
            if (!data || data.length === 0) { container.innerHTML = '<p>Нет заказов для доставки</p>'; return; }
            container.innerHTML = data.map(o => {
                const total = o.total || 0;
                const deliveryFee = total < 250 ? 50 : 0;
                return `<div class="search-result"><div><b>${o.client_name}</b><br>${o.client_address || ''}<br>${total} руб + ${deliveryFee} руб<br><span class="status-badge status-${o.status}">${o.status}</span></div>
                <div style="display:flex;gap:4px;flex-wrap:wrap;">
                    ${o.status==='new' ? `<button class="btn btn-small" onclick="window.updateOrderStatus(${o.id},'delivering')">В доставку</button>` : ''}
                    ${o.status==='delivering' ? `<button class="btn btn-small btn-green" onclick="window.updateOrderStatus(${o.id},'done')">Доставлен</button>` : ''}
                </div></div>`;
            }).join('');
        } catch(e) {
            container.innerHTML = '<p>Ошибка загрузки доставки</p>';
        }
    }

    window.updateOrderStatus = async function(id, status) {
        try {
            await sb.from('store_orders').update({ status }).eq('id', id);
        } catch(e) {}
        renderDelivery();
    };

    // СОТРУДНИКИ
    async function renderStaff() {
        if (!currentStaff || currentStaff.role !== 'admin') {
            document.getElementById('staffList').innerHTML = '<p>Только для администратора</p>';
            return;
        }
        
        try {
            const { data } = await sb.from('store_staff').select('*');
            if (!data || data.length === 0) {
                document.getElementById('staffList').innerHTML = '<p>Нет сотрудников</p>';
                return;
            }
            document.getElementById('staffList').innerHTML = data.map(s => {
                const perms = s.permissions || {};
                return `
                <div class="search-result" style="flex-direction:column; align-items:flex-start;">
                    <div style="display:flex; justify-content:space-between; width:100%;">
                        <b>${s.name}</b>
                        <div style="display:flex; gap:4px;">
                            <select onchange="window.updateStaffRole(${s.id}, this.value)" style="width:auto; padding:4px;">
                                <option value="admin" ${s.role==='admin'?'selected':''}>Админ</option>
                                <option value="seller" ${s.role==='seller'?'selected':''}>Продавец</option>
                                <option value="delivery" ${s.role==='delivery'?'selected':''}>Доставщик</option>
                            </select>
                            <button class="btn-danger" onclick="window.deleteStaff(${s.id})" style="padding:4px 8px;">Уд</button>
                        </div>
                    </div>
                    ${s.role !== 'admin' ? `
                    <div style="margin-top:8px; display:flex; flex-wrap:wrap; gap:6px;">
                        <label class="perm-label"><input type="checkbox" ${perms.clients?'checked':''} onchange="window.togglePerm(${s.id},'clients',this.checked)"> Клиенты</label>
                        <label class="perm-label"><input type="checkbox" ${perms.products?'checked':''} onchange="window.togglePerm(${s.id},'products',this.checked)"> Товары</label>
                        <label class="perm-label"><input type="checkbox" ${perms.orders?'checked':''} onchange="window.togglePerm(${s.id},'orders',this.checked)"> Заказы</label>
                        <label class="perm-label"><input type="checkbox" ${perms.delivery?'checked':''} onchange="window.togglePerm(${s.id},'delivery',this.checked)"> Доставка</label>
                    </div>` : ''}
                </div>`;
            }).join('');
        } catch(e) {
            const staff = JSON.parse(localStorage.getItem('store_staff') || '[]');
            document.getElementById('staffList').innerHTML = staff.map(s => `<div class="search-result"><b>${s.name}</b> (${s.role})</div>`).join('');
        }
    }

    async function addStaff() {
        if (!currentStaff || currentStaff.role !== 'admin') return;
        const name = prompt('Имя:'); if (!name) return;
        const login = prompt('5-значный код:'); if (!login || login.length !== 5) return;
        const password = prompt('Пароль:'); if (!password) return;
        const role = prompt('Роль (admin/seller/delivery):','seller');
        
        try {
            await sb.from('store_staff').insert({ name, login, password, role, permissions:{} });
        } catch(e) {
            const staff = JSON.parse(localStorage.getItem('store_staff') || '[]');
            staff.push({ name, login, password, role, permissions:{} });
            localStorage.setItem('store_staff', JSON.stringify(staff));
        }
        renderStaff();
    }

    window.updateStaffRole = async function(id, role) {
        try { await sb.from('store_staff').update({ role }).eq('id', id); } catch(e) {}
        renderStaff();
    };

    window.togglePerm = async function(id, perm, value) {
        try {
            const { data } = await sb.from('store_staff').select('permissions').eq('id', id).single();
            const perms = data?.permissions || {};
            perms[perm] = value;
            await sb.from('store_staff').update({ permissions: perms }).eq('id', id);
        } catch(e) {}
    };

    window.deleteStaff = async function(id) {
        try { await sb.from('store_staff').delete().eq('id', id); } catch(e) {}
        renderStaff();
    };

    // СООБЩЕНИЯ
    async function renderMessages() {
        const container = document.getElementById('messagesList');
        try {
            const { data } = await sb.from('store_messages').select('*').order('created_at',{ascending:false});
            container.innerHTML = !data||data.length===0 ? '<p>Нет сообщений</p>' : 
                data.map(m => `<div class="search-result"><div><b>${m.from_name}</b><br>${m.text}</div></div>`).join('');
        } catch(e) {
            container.innerHTML = '<p>Нет сообщений</p>';
        }
    }

    // Инициализация localStorage для тестов
    if (!localStorage.getItem('store_staff')) {
        localStorage.setItem('store_staff', JSON.stringify([
            { name:'Максим', login:'12345', password:'admin123', role:'admin', permissions:{} }
        ]));
    }

    renderMessages();
</script>
</body>
</html>
