<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Магазин — Админка</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, sans-serif; }
        body { background:#f5f5f5; min-height:100vh; padding:16px; padding-bottom:80px; }
        body.dark { background:#0e1621; color:#eef4ff; }
        .container { max-width:500px; margin:0 auto; }
        h1, h2, h3 { color:#2b9aff; margin-bottom:12px; }
        .card { background:#fff; border-radius:20px; padding:20px; margin-bottom:16px; box-shadow:0 2px 12px rgba(0,0,0,0.08); }
        body.dark .card { background:#1f2c38; }
        .field { margin-bottom:10px; }
        .field label { display:block; font-size:0.8rem; color:#666; margin-bottom:4px; }
        body.dark .field label { color:#8e9eae; }
        .field input, .field select { width:100%; padding:10px 14px; border:1px solid #ddd; border-radius:12px; font-size:0.9rem; }
        body.dark .field input, body.dark .field select { background:#0e1621; border-color:#2b3b4c; color:#fff; }
        .btn { width:100%; background:#2b9aff; border:none; border-radius:14px; padding:12px; color:#fff; font-weight:600; cursor:pointer; margin-bottom:8px; }
        .btn-outline { background:transparent; border:1px solid #2b9aff; color:#2b9aff; }
        .btn-green { background:#4bcb6e; }
        .btn-danger { background:#ff3b30; }
        .btn-sm { padding:6px 12px; font-size:0.7rem; border-radius:10px; width:auto; }
        .tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
        .tab { flex:1; min-width:50px; text-align:center; padding:10px; background:#e8e8e8; border-radius:14px; cursor:pointer; font-weight:500; font-size:0.7rem; }
        .tab.active { background:#2b9aff; color:#fff; }
        body.dark .tab { background:#2b3b4c; }
        .hidden { display:none !important; }
        .search-result { padding:10px 12px; background:#f9f9f9; border-radius:10px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:6px; }
        body.dark .search-result { background:#17212b; }
        .status-badge { display:inline-block; padding:4px 8px; border-radius:10px; font-size:0.65rem; font-weight:600; }
        .status-new { background:#d4e4ff; color:#1a4a8a; }
        .status-collecting { background:#e0d4ff; color:#4a1a8a; }
        .status-packing { background:#fff3d4; color:#8a6a1a; }
        .status-ready { background:#d4f5d4; color:#1a7a1a; }
        .status-done { background:#c0e0c0; color:#0a5a0a; }
        .status-cancelled { background:#ffe0e0; color:#c0392b; }
        .staff-card { padding:10px 12px; background:#f9f9f9; border-radius:10px; margin-bottom:6px; }
        body.dark .staff-card { background:#17212b; }
        .staff-card .staff-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
        .staff-card .staff-name { font-weight:600; }
        .staff-card .staff-role { font-size:0.75rem; color:#888; }
        .staff-card .staff-actions { display:flex; gap:4px; margin-top:6px; }
        .notification { position:fixed; top:10px; right:10px; background:#4bcb6e; color:#fff; padding:12px 20px; border-radius:12px; z-index:200; display:none; font-weight:600; font-size:0.85rem; }
        .login-screen { display:flex; align-items:center; justify-content:center; min-height:80vh; }
        .login-card { background:#fff; border-radius:24px; padding:30px; width:100%; max-width:350px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
        body.dark .login-card { background:#1f2c38; }
        .login-card input { width:100%; padding:12px; margin-bottom:12px; border:1px solid #ddd; border-radius:12px; }
        body.dark .login-card input { background:#0e1621; border-color:#2b3b4c; color:#fff; }
        .bottom-bar { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #ddd; display:flex; gap:8px; padding:10px 16px; z-index:50; }
        body.dark .bottom-bar { background:#1f2c38; border-color:#2b3b4c; }
        .bottom-btn { flex:1; text-align:center; padding:10px; border-radius:12px; background:#e8e8e8; border:none; cursor:pointer; font-weight:500; font-size:0.75rem; }
        .bottom-btn.active { background:#2b9aff; color:#fff; }
        .store-status { display:flex; gap:8px; align-items:center; margin-bottom:12px; }
        .store-status .indicator { width:12px; height:12px; border-radius:50%; }
        .store-status .indicator.open { background:#4bcb6e; }
        .store-status .indicator.closed { background:#ff3b30; }
        .slider { width:100%; margin:4px 0; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <h1>Панель управления</h1>
            <p style="color:#888; margin-bottom:20px;">Введите данные для входа</p>
            <input type="text" id="loginCode" placeholder="5-значный код">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button class="btn" id="loginBtn">Войти</button>
        </div>
    </div>

    <div id="adminInterface" class="hidden">
        <div class="notification" id="notif"></div>

        <div class="card" style="margin-bottom:8px;">
            <div class="store-status">
                <div class="indicator" id="storeIndicator"></div>
                <span id="storeStatusText">Загрузка...</span>
                <button class="btn-sm" id="storeToggleBtn" onclick="toggleStoreStatus()">Сменить</button>
            </div>
            <div style="font-size:0.8rem; color:#888;" id="storeHours">Часы: загрузка...</div>
            <button class="btn-sm btn-outline" onclick="setStoreLink()" style="margin-top:8px;">Место продажи</button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="adminTab('orders')">Заказы</div>
            <div class="tab" onclick="adminTab('products')">Товары</div>
            <div class="tab" onclick="adminTab('clients')">Клиенты</div>
            <div class="tab" onclick="adminTab('promos')">Скидки</div>
            <div class="tab" onclick="adminTab('staff')">Сотрудники</div>
        </div>

        <div id="apanelOrders" class="card">
            <h2>Заказы</h2>
            <div class="field"><label>Код заказа</label><input type="text" id="pickupCodeInput" placeholder="6-значный код" maxlength="6"></div>
            <button class="btn btn-sm" onclick="findOrderByCode()">Найти по коду</button>
            <div id="orderSearchResult"></div>
            <hr style="margin:16px 0; border-color:#ddd;">
            <div id="aOrdersList"></div>
        </div>
        <div id="apanelProducts" class="card hidden">
            <h2>Товары</h2>
            <div class="field"><input type="text" id="aProductSearch" placeholder="Номер или название"></div>
            <button class="btn" onclick="adminSearchProduct()">Найти</button>
            <div id="aProductResult"></div>
            <button class="btn-outline" onclick="adminAddProduct()" style="margin-top:12px;">Добавить товар</button>
        </div>
        <div id="apanelClients" class="card hidden">
            <h2>Поиск клиента (4 цифры карты)</h2>
            <div class="field"><input type="text" id="aClientCard" placeholder="4567" maxlength="4"></div>
            <button class="btn" onclick="adminSearchClient()">Найти</button>
            <div id="aClientResult"></div>
        </div>
        <div id="apanelPromos" class="card hidden">
            <h2>Промокоды</h2>
            <div id="aPromosList"></div>
            <button class="btn-outline" onclick="adminAddPromo()" style="margin-top:12px;">Добавить</button>
        </div>
        <div id="apanelStaff" class="card hidden">
            <h2>Сотрудники</h2>
            <div id="aStaffList"></div>
            <button class="btn-outline" onclick="adminAddStaff()" style="margin-top:12px;">Добавить</button>
        </div>
    </div>
</div>

<div class="bottom-bar" id="adminBottomBar" style="display:none;">
    <button class="bottom-btn active" onclick="adminTab('orders')">Заказы</button>
    <button class="bottom-btn" onclick="adminTab('products')">Товары</button>
    <button class="bottom-btn" onclick="adminTab('clients')">Клиенты</button>
    <button class="bottom-btn" onclick="adminTab('promos')">Скидки</button>
                </div><script>
    const SUPABASE_URL = "https://iiuahjmpszfcgtwapidt.supabase.co";
    const SUPABASE_KEY = "sb_publishable_iFYpqkv4D0qEOj4Dn1X9Nw_OH9d5Bji";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentStaff = null;
    let allProducts = [];
    let storeConfig = { open: true, hours: '09:00 - 20:00', mapLink: '', global_bonus_percent: 100 };

    const statusFlow = {
        new: { next: 'collecting', label: 'Собирается', btn: 'На сборку' },
        collecting: { next: 'packing', label: 'Упаковывается', btn: 'Упаковать' },
        packing: { next: 'ready', label: 'Готов к выдаче', btn: 'Готов' },
        ready: { next: 'done', label: 'Выдан', btn: 'Выдать' }
    };
    const statusNames = { new:'Новый', collecting:'Собирается', packing:'Упаковывается', ready:'Готов к выдаче', done:'Выдан', cancelled:'Отменён' };

    function saveStoreConfig() { localStorage.setItem('store_config', JSON.stringify(storeConfig)); }
    function updateStoreUI() {
        document.getElementById('storeIndicator').className = 'indicator ' + (storeConfig.open ? 'open' : 'closed');
        document.getElementById('storeStatusText').innerText = storeConfig.open ? 'Открыто' : 'Закрыто';
        document.getElementById('storeToggleBtn').innerText = storeConfig.open ? 'Закрыть' : 'Открыть';
        document.getElementById('storeHours').innerText = 'Часы: ' + (storeConfig.hours || 'не указаны');
    }
    function toggleStoreStatus() {
        storeConfig.open = !storeConfig.open; saveStoreConfig(); updateStoreUI();
        sb.from('store_config').upsert({ id:1, open:storeConfig.open, hours:storeConfig.hours, map_link:storeConfig.mapLink, global_bonus_percent:storeConfig.global_bonus_percent });
    }
    function setStoreLink() {
        const link = prompt('Ссылка на место в картах:', storeConfig.mapLink || '');
        if (link !== null) { storeConfig.mapLink = link; saveStoreConfig(); sb.from('store_config').upsert({ id:1, open:storeConfig.open, hours:storeConfig.hours, map_link:link, global_bonus_percent:storeConfig.global_bonus_percent }); }
    }
    async function loadStoreConfig() {
        try {
            const { data } = await sb.from('store_config').select('*').eq('id', 1).single();
            if (data) { storeConfig.open = data.open; storeConfig.hours = data.hours || '09:00 - 20:00'; storeConfig.mapLink = data.map_link || ''; storeConfig.global_bonus_percent = data.global_bonus_percent || 100; }
        } catch(e) {}
        updateStoreUI();
    }

    document.getElementById('loginBtn').addEventListener('click', adminLogin);
    
    async function adminLogin() {
        const login = document.getElementById('loginCode').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        let staff = null;
        try {
            const { data } = await sb.from('store_staff').select('*').eq('login', login).eq('password', password).single();
            staff = data;
        } catch(e) {}
        if (!staff) {
            const localStaff = JSON.parse(localStorage.getItem('store_staff') || '[]');
            staff = localStaff.find(s => s.login === login && s.password === password);
        }
        if (staff) {
            currentStaff = staff;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminInterface').classList.remove('hidden');
            document.getElementById('adminBottomBar').style.display = 'flex';
            loadStoreConfig(); loadAllProducts(); adminTab('orders'); subscribeToOrders();
        } else { alert('Неверный код или пароль'); }
    }

    function subscribeToOrders() {
        sb.channel('orders').on('postgres_changes', { event:'INSERT', schema:'public', table:'store_orders' }, payload => {
            showNotification('Новый заказ от ' + payload.new.client_name + ' на ' + payload.new.total + ' руб');
            adminRenderOrders();
        }).subscribe();
    }
    function showNotification(msg) { const n = document.getElementById('notif'); n.innerText = msg; n.style.display = 'block'; setTimeout(() => n.style.display = 'none', 4000); }

    function adminTab(tab) {
        document.querySelectorAll('#adminInterface .tab').forEach(t => t.classList.remove('active'));
        const tabEl = document.querySelector(`#adminInterface .tab[onclick*="${tab}"]`);
        if (tabEl) tabEl.classList.add('active');
        document.querySelectorAll('.bottom-btn').forEach(b => b.classList.remove('active'));
        const bottomEl = document.querySelector(`.bottom-btn[onclick*="${tab}"]`);
        if (bottomEl) bottomEl.classList.add('active');
        ['Orders','Products','Clients','Promos','Staff'].forEach(t => document.getElementById('apanel'+t).classList.add('hidden'));
        document.getElementById('apanel'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.remove('hidden');
        if (tab==='products') loadAllProducts().then(() => adminRenderProducts());
        if (tab==='orders') adminRenderOrders();
        if (tab==='promos') adminRenderPromos();
        if (tab==='staff') adminRenderStaff();
    }

    // ЗАКАЗЫ
    async function adminRenderOrders() {
        let orders = [];
        try { const { data } = await sb.from('store_orders').select('*').order('created_at',{ascending:false}); orders = data || []; }
        catch(e) { orders = JSON.parse(localStorage.getItem('store_orders') || '[]'); }
        
        // Премиум-заказы первыми
        const premiumOrders = orders.filter(o => o.premium);
        const normalOrders = orders.filter(o => !o.premium);
        const sorted = [...premiumOrders, ...normalOrders];
        
        document.getElementById('aOrdersList').innerHTML = sorted.length===0 ? '<p>Нет заказов</p>' : sorted.map(o => {
            const next = statusFlow[o.status];
            return `<div class="search-result"><div><b>${o.client_name}</b> ${o.premium ? '⭐' : ''}<br>${o.total} руб | Баллы: +${o.total_bonus||0} | Списано: ${o.use_bonus||0}<br><span class="status-badge status-${o.status}">${statusNames[o.status]||o.status}</span>
            ${o.pickup_code ? `<br>Код: <b>${o.pickup_code}</b>` : ''}
            <button class="btn btn-sm" onclick="showOrderDetail('${o.id}')">Подробнее</button></div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;">
                ${next ? `<button class="btn btn-sm" onclick="adminSetStatus(${o.id},'${next.next}')">${next.btn}</button>` : ''}
                ${o.status==='ready' ? `
                    <button class="btn btn-sm btn-green" onclick="adminSetStatus(${o.id},'done')">Выдать</button>
                    <button class="btn btn-sm btn-danger" onclick="cancelReady(${o.id})">Отмена</button>
                ` : ''}
                ${o.status==='new' ? `<button class="btn btn-sm btn-danger" onclick="adminSetStatus(${o.id},'cancelled')">Отклонить</button>` : ''}
            </div></div>`;
        }).join('');
    }

    function showOrderDetail(id) {
        // Загружаем из localStorage (быстрый доступ)
        const orders = JSON.parse(localStorage.getItem('store_orders_backup') || '[]');
        const o = orders.find(o => o.id == id);
        if (o) {
            const items = o.items || [];
            alert('Заказ #' + (o.pickup_code || '—') + '\n' + o.client_name + '\n\n' + items.map(i => '#' + i.product_code + ' ' + i.product_name + ' x' + i.quantity + ' = ' + (i.price * i.quantity) + ' руб').join('\n') + '\n\nСумма: ' + o.total + ' руб\nБаллы: +' + (o.total_bonus||0) + '\nСписано: ' + (o.use_bonus||0) + ' баллов\nСтатус: ' + (statusNames[o.status]||o.status));
        } else {
            alert('Заказ не найден в локальном кэше. Обновите страницу.');
        }
    }

    async function findOrderByCode() {
        const code = document.getElementById('pickupCodeInput').value.trim();
        if (!code) return;
        let order = null;
        try { const { data } = await sb.from('store_orders').select('*').eq('pickup_code', code).single(); order = data; }
        catch(e) { const orders = JSON.parse(localStorage.getItem('store_orders')||'[]'); order = orders.find(o => o.pickup_code === code); }
        document.getElementById('orderSearchResult').innerHTML = !order ? '<p>Заказ не найден</p>' : `
            <div class="search-result"><div><b>${order.client_name}</b><br>${order.total} руб<br><span class="status-badge status-${order.status}">${statusNames[order.status]}</span></div>
            ${statusFlow[order.status] ? `<button class="btn btn-sm btn-green" onclick="adminSetStatus(${order.id},'${statusFlow[order.status].next}')">${statusFlow[order.status].btn}</button>` : ''}</div>`;
    }

    async function adminSetStatus(id, status) {
        if (status === 'done') {
            try {
                const { data: order } = await sb.from('store_orders').select('*').eq('id', id).single();
                if (order && order.client_card) {
                    const { data: client } = await sb.from('store_clients').select('*').ilike('card_number', '%'+order.client_card).single();
                    if (client) {
                        const newBalance = (client.balance || 0) + (order.total_bonus || 0);
                        await sb.from('store_clients').update({ balance: newBalance }).eq('id', client.id);
                    }
                }
            } catch(e) {}
        }
        try { await sb.from('store_orders').update({ status }).eq('id', id); } catch(e) {}
        adminRenderOrders();
        document.getElementById('orderSearchResult').innerHTML = '';
        document.getElementById('pickupCodeInput').value = '';
    }

    async function cancelReady(id) {
        const reason = prompt('Причина отмены:') || 'Отменено';
        try { await sb.from('store_orders').update({ status:'cancelled', reject_reason:reason }).eq('id', id); } catch(e) {}
        adminRenderOrders();
    }

    // ТОВАРЫ
    async function loadAllProducts() { try { const { data } = await sb.from('store_products').select('*').order('code'); allProducts = data||[]; } catch(e) { allProducts = JSON.parse(localStorage.getItem('store_products')||'[]'); } }
    function adminRenderProducts(filter='') {
        const filtered = filter ? allProducts.filter(p => p.code.toString()===filter || p.name.toLowerCase().includes(filter)) : allProducts;
        document.getElementById('aProductResult').innerHTML = filtered.length===0 ? '<p>Ничего</p>' : filtered.map(p => `
            <div class="search-result"><div><b>#${p.code} ${p.name}</b><br>${p.price} руб | +${p.bonus_points||0} баллов | Ост: ${p.stock}</div>
            <div style="display:flex;gap:4px;"><button class="btn btn-sm" onclick="editProduct(${p.id})" style="background:#ffc107;color:#000;">Ред</button><button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">Уд</button></div></div>`).join('');
    }
    function adminSearchProduct() { adminRenderProducts(document.getElementById('aProductSearch').value.trim()); }
    async function adminAddProduct() {
        const name = prompt('Название:'); if (!name) return;
        const code = parseInt(prompt('Код:')); if (isNaN(code)) return;
        const price = parseInt(prompt('Цена:')); if (isNaN(price)) return;
        const bonus = parseInt(prompt('Баллов:'))||0; const stock = parseInt(prompt('Остаток:'))||0;
        try { await sb.from('store_products').insert({ code, name, price, bonus_points:bonus, stock }); } catch(e) {}
        loadAllProducts().then(() => adminRenderProducts());
    }
    async function editProduct(id) {
        const p = allProducts.find(pr => pr.id===id); if (!p) return;
        const name = prompt('Название:',p.name); if (name===null) return;
        const price = parseInt(prompt('Цена:',p.price)); if (isNaN(price)) return;
        const bonus = parseInt(prompt('Баллы:',p.bonus_points||0))||0; const stock = parseInt(prompt('Остаток:',p.stock))||0;
        try { await sb.from('store_products').update({ name, price, bonus_points:bonus, stock }).eq('id', id); } catch(e) {}
        loadAllProducts().then(() => adminRenderProducts());
    }
    async function deleteProduct(id) { if (!confirm('Удалить?')) return; try { await sb.from('store_products').delete().eq('id', id); } catch(e) {} loadAllProducts().then(() => adminRenderProducts()); }

    // КЛИЕНТЫ
    async function adminSearchClient() {
        const digits = document.getElementById('aClientCard').value.trim();
        if (digits.length !== 4) return alert('4 цифры');
        let clients = [];
        try { const { data } = await sb.from('store_clients').select('*').ilike('card_number', '%'+digits); clients = data || []; } catch(e) {}
        const c = clients[0];
        document.getElementById('aClientResult').innerHTML = !c ? '<p>Не найден</p>' : `
            <div class="search-result"><div><b>${c.name}</b><br>Карта: ...${c.card_number.slice(-4)}<br>Баллы: ${c.balance||0} | ${c.active?'Активна':'Не активна'} | Премиум: ${c.premium?'Да':'Нет'}</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap;">
                ${!c.active?`<button class="btn btn-sm btn-green" onclick="activateCard('${c.id}')">Активировать</button>`:''}
                <button class="btn btn-sm" onclick="addBonus('${c.id}')">+Баллы</button>
                <button class="btn btn-sm btn-danger" onclick="spendBonus('${c.id}')">Списать</button>
                <button class="btn btn-sm" onclick="setMaxSpend('${c.id}')">Лимит</button>
                <button class="btn btn-sm ${c.premium ? 'btn-danger' : 'btn-green'}" onclick="togglePremium('${c.id}', ${c.premium})">${c.premium ? 'Убрать премиум' : 'Активировать премиум'}</button>
            </div></div>`;
    }
    async function activateCard(id) { try { await sb.from('store_clients').update({ active:true }).eq('id', id); } catch(e) {} adminSearchClient(); }
    async function addBonus(id) {
        const amount = parseInt(prompt('Сколько баллов начислить?'))||0;
        if (amount <= 0) return;
        try { const { data } = await sb.from('store_clients').select('balance').eq('id', id).single(); await sb.from('store_clients').update({ balance:(data?.balance||0)+amount }).eq('id', id); } catch(e) {}
        adminSearchClient();
    }
    async function spendBonus(id) {
        const amount = parseInt(prompt('Сколько баллов списать?'))||0;
        if (amount <= 0) return;
        try { const { data } = await sb.from('store_clients').select('balance').eq('id', id).single(); await sb.from('store_clients').update({ balance:Math.max(0,(data?.balance||0)-amount) }).eq('id', id); } catch(e) {}
        adminSearchClient();
    }
    async function setMaxSpend(id) {
        const amount = parseInt(prompt('Максимум баллов для списания (0 = без лимита):'))||0;
        try { await sb.from('store_clients').update({ max_bonus_spend: amount || null }).eq('id', id); } catch(e) {}
        adminSearchClient();
    }
    async function togglePremium(id, current) {
        if (current) {
            if (!confirm('Убрать премиум-статус?')) return;
            try { await sb.from('store_clients').update({ premium: false, premium_until: null }).eq('id', id); } catch(e) {}
        } else {
            try { await sb.from('store_clients').update({ premium: true, premium_until: new Date(Date.now() + 30*24*60*60*1000).toISOString() }).eq('id', id); } catch(e) {}
        }
        adminSearchClient();
    }

    // ПРОМОКОДЫ
    async function adminRenderPromos() {
        let promos = [];
        try { const { data } = await sb.from('store_promos').select('*'); promos = data || []; } catch(e) {}
        document.getElementById('aPromosList').innerHTML = promos.length===0 ? '<p>Нет</p>' : promos.map(p => {
            const productsText = (p.product_codes && p.product_codes.length > 0) ? p.product_codes.join(', ') : 'Все товары';
            const tags = [];
            if (p.for_new_clients) tags.push('Новым');
            if (p.premium_only) tags.push('Премиум');
            const tagText = tags.length > 0 ? ' [' + tags.join(', ') + ']' : '';
            return `<div class="search-result"><div><b>${p.code}</b> — ${p.discount}%${tagText}<br><small>Товары: ${productsText}</small></div>
            <div style="display:flex;gap:4px;"><button class="btn btn-sm" onclick="editPromo(${p.id})">Ред</button><button class="btn btn-sm btn-danger" onclick="deletePromo(${p.id})">Уд</button></div></div>`;
        }).join('');
    }
    async function adminAddPromo() {
        const code = prompt('Код:'); if (!code) return;
        const discount = parseInt(prompt('Скидка %:')); if (isNaN(discount)) return;
        const forNew = confirm('Только для новых клиентов?');
        const premiumOnly = confirm('Только для премиум?');
        const productCodesStr = prompt('Коды товаров через запятую (пусто = все):') || '';
        const productCodes = productCodesStr ? productCodesStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n)) : [];
        try { await sb.from('store_promos').insert({ code, discount, product_codes: productCodes, for_new_clients: forNew, premium_only: premiumOnly }); } catch(e) {}
        adminRenderPromos();
    }
    async function editPromo(id) {
        const { data } = await sb.from('store_promos').select('*').eq('id', id).single();
        if (!data) return;
        const code = prompt('Код:', data.code); if (!code) return;
        const discount = parseInt(prompt('Скидка %:', data.discount)); if (isNaN(discount)) return;
        const forNew = confirm('Только для новых клиентов?');
        const premiumOnly = confirm('Только для премиум?');
        const productCodesStr = prompt('Коды товаров через запятую:', (data.product_codes||[]).join(', ')) || '';
        const productCodes = productCodesStr ? productCodesStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n)) : [];
        try { await sb.from('store_promos').update({ code, discount, product_codes: productCodes, for_new_clients: forNew, premium_only: premiumOnly }).eq('id', id); } catch(e) {}
        adminRenderPromos();
    }
    async function deletePromo(id) { try { await sb.from('store_promos').delete().eq('id', id); } catch(e) {} adminRenderPromos(); }

    // СОТРУДНИКИ
    async function adminRenderStaff() {
        let staff = [];
        try { const { data } = await sb.from('store_staff').select('*'); staff = data || []; } catch(e) { staff = JSON.parse(localStorage.getItem('store_staff')||'[]'); }
        document.getElementById('aStaffList').innerHTML = staff.length===0 ? '<p>Нет</p>' : staff.map(s => `
            <div class="staff-card">
                <div class="staff-header"><span class="staff-name">${s.name}</span><span class="staff-role">${s.role}</span></div>
                <div class="staff-actions">
                    <button class="btn btn-sm" onclick="editStaff(${s.id})">Ред</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteStaff(${s.id})">Удалить</button>
                </div>
            </div>
        `).join('');
    }
    async function adminAddStaff() {
        const name = prompt('Имя:'); if (!name) return;
        const login = prompt('5-значный код:'); if (!login || login.length !== 5) return;
        const password = prompt('Пароль:'); if (!password) return;
        const role = prompt('Роль (admin/seller/delivery):', 'seller');
        try { await sb.from('store_staff').insert({ name, login, password, role }); } catch(e) {}
        adminRenderStaff();
    }
    async function editStaff(id) {
        const staffData = await getStaffById(id);
        if (!staffData) return alert('Сотрудник не найден');
        const name = prompt('Имя:', staffData.name); if (name === null) return;
        const role = prompt('Роль (admin/seller/delivery):', staffData.role);
        const changePwd = confirm('Сменить пароль?');
        let password = staffData.password;
        if (changePwd) {
            password = prompt('Новый пароль:'); if (!password) return;
        }
        try { await sb.from('store_staff').update({ name, role, password }).eq('id', id); } catch(e) {}
        adminRenderStaff();
    }
    async function getStaffById(id) {
        try { const { data } = await sb.from('store_staff').select('*').eq('id', id).single(); return data; } catch(e) { return null; }
    }
    async function deleteStaff(id) {
        if (!confirm('Удалить сотрудника?')) return;
        try { await sb.from('store_staff').delete().eq('id', id); } catch(e) {}
        adminRenderStaff();
    }

    if (!localStorage.getItem('store_staff')) {
        localStorage.setItem('store_staff', JSON.stringify([{ name:'Максим', login:'12345', password:'admin123', role:'admin' }]));
    }

    updateStoreUI(); loadStoreConfig();
</script>
</body>
</html>
