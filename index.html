<script>
    const SUPABASE_URL = "https://iiuahjmpszfcgtwapidt.supabase.co";
    const SUPABASE_KEY = "sb_publishable_iFYpqkv4D0qEOj4Dn1X9Nw_OH9d5Bji";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentTheme = localStorage.getItem('store_admin_theme') || 'light';
    let currentStaff = null;
    let allProducts = [];

    function applyTheme() { document.body.classList.toggle('dark', currentTheme === 'dark'); }
    function toggleTheme() { currentTheme = currentTheme === 'light' ? 'dark' : 'light'; localStorage.setItem('store_admin_theme', currentTheme); applyTheme(); }
    applyTheme();

    // ======== ВХОД ========
    async function adminLogin() {
        const login = document.getElementById('loginCode').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const { data } = await sb.from('store_staff').select('*').eq('login', login).eq('password', password).single();
        if (data) {
            currentStaff = data;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminInterface').classList.remove('hidden');
            document.getElementById('themeBtn').classList.remove('hidden');
            document.getElementById('staffInfo').innerText = 'Вы вошли как: ' + data.name + ' (' + (data.access === 'full' ? 'Полный доступ' : 'Ограниченный') + ')';
            if (data.access !== 'full') {
                document.querySelector('[onclick*="switchPanel(\'staff\')"]').style.display = 'none';
            }
            renderStaff();
            renderMessages();
            loadAllProducts();
        } else {
            alert('Неверный код или пароль');
        }
    }

    function switchPanel(panel) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        const targetTab = document.querySelector(`.tab[onclick*="${panel}"]`);
        if (targetTab) targetTab.classList.add('active');
        ['Clients','Products','Orders','Staff','Messages'].forEach(p => document.getElementById('panel' + p).classList.add('hidden'));
        document.getElementById('panel' + panel.charAt(0).toUpperCase() + panel.slice(1)).classList.remove('hidden');
        if (panel === 'orders') renderOrders();
        if (panel === 'messages') renderMessages();
        if (panel === 'staff') renderStaff();
        if (panel === 'products') loadAllProducts();
    }

    // ======== КЛИЕНТЫ ========
    async function searchClient() {
        const phone = document.getElementById('clientPhone').value.trim().replace(/\D/g, '');
        if (!phone) return alert('Введите номер телефона');
        
        let { data } = await sb.from('store_clients').select('*').eq('phone', '+' + phone).single();
        if (!data && phone.length >= 4) {
            const { data: all } = await sb.from('store_clients').select('*');
            data = all?.find(c => c.phone.replace(/\D/g, '').endsWith(phone));
        }
        
        const container = document.getElementById('clientResult');
        if (!data) { container.innerHTML = '<p>Клиент не найден.</p>'; return; }
        
        container.innerHTML = `
            <div class="result">
                <b>${data.name}</b><br>Телефон: ${data.phone}<br>Карта: ${data.card_number || '—'}<br>
                Статус: <span class="status-badge ${data.active ? 'status-active' : 'status-inactive'}">${data.active ? 'Активирована' : 'Не активирована'}</span><br>
                Баллы: ${data.balance}<br>Почта: ${data.email || 'не указана'}
            </div>
            ${!data.active ? `
                <div class="instruction"><b>Активация:</b><br>1. Скажите: «Уважаемый покупатель, мы вам позвоним. Покажите, что я звоню».<br>2. Нажмите «Позвонить».<br>3. Если всё совпадает — «Активировать».</div>
                <button class="btn btn-call" onclick="callClient('${data.phone}')">Позвонить</button>
                <button class="btn btn-green" onclick="activateClient('${data.id}')">Активировать карту</button>
            ` : `
                <div class="field" style="margin-top:12px;"><label>Начислить бонусы</label><input type="number" id="bonusAmount" placeholder="Сумма"></div>
                <button class="btn btn-green" onclick="addBonus('${data.id}')">Начислить бонусы</button>
                <div class="field" style="margin-top:12px;"><label>Сумма покупки</label><input type="number" id="purchaseAmount" placeholder="0"></div>
                <div class="field"><label>Скидка (%)</label><input type="number" id="purchaseDiscount" value="0" max="100"></div>
                <button class="btn" onclick="processPurchase()">Рассчитать</button>
            `}
        `;
    }

    function callClient(phone) { window.location.href = 'tel:' + phone.replace(/\D/g, ''); }

    async function activateClient(id) {
        await sb.from('store_clients').update({ active: true }).eq('id', id);
        alert('Карта активирована!');
        searchClient();
    }

    async function addBonus(id) {
        const amount = parseInt(document.getElementById('bonusAmount').value) || 0;
        if (amount <= 0) return;
        const { data } = await sb.from('store_clients').select('balance').eq('id', id).single();
        if (data) {
            await sb.from('store_clients').update({ balance: data.balance + amount }).eq('id', id);
            alert('Начислено ' + amount + ' баллов');
            searchClient();
        }
    }

    // ======== ТОВАРЫ ========
    async function loadAllProducts() {
        const { data } = await sb.from('store_products').select('*').order('code');
        allProducts = data || [];
        renderAllProducts();
    }

    function renderAllProducts(filter = '') {
        const container = document.getElementById('productResult');
        const filtered = filter ? allProducts.filter(p => 
            p.code.toString() === filter || p.name.toLowerCase().includes(filter.toLowerCase())
        ) : allProducts;

        if (filtered.length === 0) {
            container.innerHTML = '<p style="color:#888;">Ничего не найдено</p>';
            return;
        }

        container.innerHTML = filtered.map(p => `
            <div class="search-result">
                <div>
                    <b>#${p.code} ${p.name}</b><br>
                    <small>${p.price} руб | Осталось: ${p.stock} шт</small>
                </div>
                <div style="display:flex; gap:4px;">
                    <button class="btn btn-small" onclick="editProduct(${p.id})" style="background:#ffc107; color:#000; padding:4px 8px;">Изм</button>
                    <button class="btn btn-small btn-danger" onclick="deleteProduct(${p.id})" style="padding:4px 8px;">Уд</button>
                </div>
            </div>
        `).join('');
    }

    function searchProduct() {
        const query = document.getElementById('productSearch').value.trim();
        renderAllProducts(query);
    }

    async function addProduct() {
        const name = prompt('Название:');
        if (!name) return;
        const code = parseInt(prompt('Код товара (уникальное число):'));
        if (isNaN(code)) return;
        const price = parseInt(prompt('Цена (руб):'));
        if (isNaN(price)) return;
        const stock = parseInt(prompt('Количество на складе:')) || 0;
        await sb.from('store_products').insert({ code, name, price, stock });
        alert('Товар добавлен');
        loadAllProducts();
    }

    window.editProduct = async function(id) {
        const product = allProducts.find(p => p.id === id);
        if (!product) return;
        const name = prompt('Название:', product.name);
        if (name === null) return;
        const price = parseInt(prompt('Цена:', product.price));
        if (isNaN(price)) return;
        const stock = parseInt(prompt('Остаток:', product.stock)) || 0;
        await sb.from('store_products').update({ name, price, stock }).eq('id', id);
        alert('Обновлено');
        loadAllProducts();
    };

    window.deleteProduct = async function(id) {
        if (!confirm('Удалить товар?')) return;
        await sb.from('store_products').delete().eq('id', id);
        alert('Удалён');
        loadAllProducts();
    };

    // ======== ЗАКАЗЫ ========
    async function renderOrders() {
        const { data } = await sb.from('store_orders').select('*').order('created_at', { ascending: false });
        document.getElementById('ordersList').innerHTML = !data || data.length === 0 ? '<p>Нет заказов</p>' :
            data.map(o => `
                <div class="search-result">
                    <div>
                        <b>${o.client_name}</b> — ${o.order_time}<br>
                        <small>${new Date(o.created_at).toLocaleString('ru')}</small>
                    </div>
                    ${!o.receipt_sent ? `<button class="btn btn-small" onclick="sendReceipt(${o.id})">Чек</button>` : '<small>Отправлен</small>'}
                </div>
            `).join('');
    }

    async function sendReceipt(id) {
        const { data } = await sb.from('store_orders').select('*').eq('id', id).single();
        if (!data) return;
        const { data: client } = await sb.from('store_clients').select('email').eq('phone', data.client_phone).single();
        const email = client?.email || prompt('Почта клиента:');
        if (!email) return;
        const body = 'Чек по заказу от ' + new Date(data.created_at).toLocaleString('ru') + '\n\nСпасибо за покупку!';
        window.location.href = 'mailto:' + email + '?subject=Чек&body=' + encodeURIComponent(body);
        await sb.from('store_orders').update({ receipt_sent: true }).eq('id', id);
        renderOrders();
    }

    // ======== СОТРУДНИКИ ========
    async function renderStaff() {
        if (!currentStaff || currentStaff.access !== 'full') return;
        const { data } = await sb.from('store_staff').select('*');
        document.getElementById('staffList').innerHTML = data?.map(s => `
            <div class="search-result">
                <div><b>${s.name}</b> (${s.access === 'full' ? 'Полный' : 'Ограниченный'})</div>
                <button class="btn-danger" onclick="deleteStaff(${s.id})" style="padding:4px 8px;">Удалить</button>
            </div>
        `).join('') || '<p>Нет сотрудников</p>';
    }

    async function addStaff() {
        if (!currentStaff || currentStaff.access !== 'full') return;
        const name = prompt('Имя:');
        if (!name) return;
        const login = prompt('5-значный код:');
        if (!login || login.length !== 5) return;
        const password = prompt('Пароль:');
        if (!password) return;
        const access = confirm('Полный доступ?') ? 'full' : 'limited';
        await sb.from('store_staff').insert({ name, login, password, access });
        renderStaff();
    }

    async function deleteStaff(id) {
        await sb.from('store_staff').delete().eq('id', id);
        renderStaff();
    }

    // ======== СООБЩЕНИЯ ========
    async function renderMessages() {
        const { data } = await sb.from('store_messages').select('*').order('created_at', { ascending: false });
        document.getElementById('messagesList').innerHTML = !data || data.length === 0 ? '<p>Нет сообщений</p>' :
            data.map(m => `
                <div class="search-result">
                    <div><b>${m.from_name}</b><br>${m.text}<br><small>${new Date(m.created_at).toLocaleString('ru')}</small></div>
                    <button class="btn-danger" onclick="deleteMsg(${m.id})" style="padding:4px 8px;">Удалить</button>
                </div>
            `).join('');
        document.getElementById('msgBadge').innerText = data?.length || 0;
    }

    async function deleteMsg(id) {
        await sb.from('store_messages').delete().eq('id', id);
        renderMessages();
    }

    renderMessages();
</script>
</body>
</html>
